name: Deploy Election Assistant

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Backend Lint & Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          
      - name: Frontend Build Check
        run: |
          cd frontend
          npm install
          npm run build
          
  deploy-frontend:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Vercel Action
        run: echo "Integrating with Vercel for automatic deployments..."

  deploy-backend:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Render Deploy
        run: echo "Triggering Render/Railway webhook for backend deployment..."
